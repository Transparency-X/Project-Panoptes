name: Validate Data

on:
  push:
    paths:
      - 'data/**'
      - 'schema/**'
  pull_request:
    paths:
      - 'data/**'
      - 'schema/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install jsonschema
      - name: Validate JSON files
        run: python scripts/validate_data.py
